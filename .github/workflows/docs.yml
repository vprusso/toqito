name: Deploy Documentation

on:
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "toqito/**"
      - ".github/workflows/docs.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

# Serialize all writers of the gh-pages branch (this workflow + Docs Preview)
# so mike's deploy and rossjrw/pr-preview-action cleanup don't race each other
# and lose one of the pushes to a non-fast-forward rejection.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies for BLAS/LAPACK
        run: |
          sudo apt-get update
          sudo apt-get install -y libblas-dev liblapack-dev gfortran libatlas-base-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies with uv
        run: uv sync --group docs

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy dev docs (on push to master)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          cd docs
          uv run mike deploy --push dev

      - name: Deploy versioned docs (on release)
        if: github.event_name == 'release'
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
          VERSION=${VERSION#.}
          cd docs
          uv run mike deploy --push --update-aliases "$VERSION" latest
          uv run mike set-default --push latest
